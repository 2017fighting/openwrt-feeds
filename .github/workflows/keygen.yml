name: keygen

# One-time generator for the apk feed signing keypair (usign ed25519).
# Run manually once (Actions -> keygen -> Run workflow). It prints the base64
# private key (set as Actions secret APK_SIGN_KEY) and uploads the public key
# (commit as keys/key-build.pub). Nothing is persisted in the repo.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  keygen:
    name: Generate usign keypair
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (metadata only)
        uses: actions/checkout@v4

      - name: Download OpenWrt SDK (for its bundled usign binary)
        run: |
          mkdir -p sdk
          url="https://downloads.openwrt.org/releases/25.12.4/targets/x86/64/openwrt-sdk-25.12.4-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          curl -fL "$url" -o sdk.tar.zst
          tar -I zstd -xf sdk.tar.zst -C sdk --strip-components=1
          test -x sdk/staging_dir/host/bin/usign

      - name: Generate keypair
        run: |
          ./sdk/staging_dir/host/bin/usign -G -s key-build -p key-build.pub -c "openwrt-feeds"
          echo "=============================================================="
          echo " PUBLIC KEY  -> commit as  keys/key-build.pub"
          echo "=============================================================="
          cat key-build.pub
          echo "=============================================================="
          echo " PRIVATE KEY (base64) -> Actions secret  APK_SIGN_KEY"
          echo " (copy the line below, including no whitespace)"
          echo "=============================================================="
          base64 key-build
          echo "=============================================================="

      - name: Upload public key artifact
        uses: actions/upload-artifact@v4
        with:
          name: signing-pubkey
          path: key-build.pub
          retention-days: 1
