name: keygen

# One-time generator for the apk feed signing keypair: an openssl EC
# (prime256v1) key, matching how official OpenWrt signs apk indexes
# (apk adbsign --sign-key <key> packages.adb).
#
# Run manually once (Actions -> keygen -> Run workflow). It prints the base64
# private key (set as Actions secret APK_SIGN_KEY) and uploads the public key
# (commit as keys/2017fighting.pem). Nothing is persisted in the repo.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  keygen:
    name: Generate openssl EC apk keypair
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (metadata only)
        uses: actions/checkout@v4

      - name: Generate keypair
        run: |
          # Same commands OpenWrt's package/Makefile uses to create BUILD_KEY_APK_*.
          openssl ecparam -name prime256v1 -genkey -noout -out private-key.pem
          openssl ec -in private-key.pem -pubout -out 2017fighting.pem

          head -n1 2017fighting.pem | grep -q '^-----BEGIN PUBLIC KEY-----' \
            || { echo "public key is not a -----BEGIN PUBLIC KEY----- PEM"; exit 1; }

          echo "=============================================================="
          echo " PUBLIC KEY  -> commit as  keys/2017fighting.pem"
          echo "=============================================================="
          cat 2017fighting.pem
          echo "=============================================================="
          echo " PRIVATE KEY (base64) -> Actions secret  APK_SIGN_KEY"
          echo " (copy the single line below, no whitespace)"
          echo "=============================================================="
          base64 < private-key.pem | tr -d '\n'
          echo
          echo "=============================================================="

      - name: Upload public key artifact
        uses: actions/upload-artifact@v4
        with:
          name: signing-pubkey
          path: 2017fighting.pem
          retention-days: 1
