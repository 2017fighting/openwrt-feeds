name: build

# Build every feed package for each (OpenWrt version x arch), generate + sign
# the apk repository index, and publish the whole site to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - 'net/**'
      - 'luci/**'
      - 'feeds.config'
      - 'keys/2017fighting.pem'
      - 'feed.sh'            # published to the Pages site root — republish on change
      - 'README.md'          # copied to the Pages site — republish on change
      - '.github/workflows/build.yml'
      - '.github/workflows/keygen.yml'
      - 'tooling/**'
  workflow_dispatch:

# Let the latest run finish publishing; do not cancel an in-progress deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FEED_NAME: openwrtfeeds
  GO_VERSION: '1.26'

jobs:
  # Read feeds.config and emit the matrix as JSON. Adding a version/arch is now
  # a one-line change in feeds.config — no workflow edit needed.
  matrix:
    name: Build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          m="$(jq -c '{include: .feeds}' feeds.config)"
          echo "matrix=$m" >> "$GITHUB_OUTPUT"
          echo "$m"

  build:
    name: Build ${{ matrix.openwrt_version }} / ${{ matrix.arch }}
    needs: [matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - name: Checkout feed
        uses: actions/checkout@v4

      - name: Set up Go (host toolchain; cross-compiles mosdns)
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false  # no go.sum at repo root; Go modules resolve inside the SDK build

      - name: Expose Go to the SDK build environment
        run: |
          echo "$(go env GOROOT)/bin" >> $GITHUB_PATH
          echo "GOROOT=$(go env GOROOT)" >> $GITHUB_ENV
          echo "GOPATH=$(go env GOPATH)" >> $GITHUB_ENV
          go version

      - name: Compute SDK URL
        id: sdk
        run: |
          v="${{ matrix.openwrt_version }}"
          name="openwrt-sdk-${v}-${{ matrix.target }}-${{ matrix.subtarget }}_gcc-${{ matrix.gcc_ver }}_musl.Linux-x86_64"
          url="https://downloads.openwrt.org/releases/${v}/targets/${{ matrix.target }}/${{ matrix.subtarget }}/${name}.tar.zst"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "url=$url"   >> "$GITHUB_OUTPUT"
          echo "$url"

      - name: Cache SDK tarball (public; saves re-downloading)
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/sdk.tar.zst
          key: sdk-tarball-${{ matrix.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.gcc_ver }}

      - name: Download SDK tarball
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: curl -fL "${{ steps.sdk.outputs.url }}" -o "$GITHUB_WORKSPACE/sdk.tar.zst"

      # Always extract fresh: never cache the extracted tree, so feed/key state
      # cannot leak across runs (a leaked feeds.conf caused a duplicate entry).
      - name: Extract SDK
        run: |
          rm -rf "$GITHUB_WORKSPACE/sdk"
          mkdir -p "$GITHUB_WORKSPACE/sdk"
          tar -I zstd -xf "$GITHUB_WORKSPACE/sdk.tar.zst" -C "$GITHUB_WORKSPACE/sdk" --strip-components=1

      - name: Verify signing prerequisites
        env:
          APK_SIGN_KEY: ${{ secrets.APK_SIGN_KEY }}
        run: |
          [ -n "$APK_SIGN_KEY" ] || { echo "::error::Actions secret APK_SIGN_KEY is not set. Run tooling/gen-key.sh (or the 'keygen' workflow), then add the secret."; exit 1; }
          [ -f keys/2017fighting.pem ] || { echo "::error::keys/2017fighting.pem is missing. Run tooling/gen-key.sh and commit the public key."; exit 1; }

      - name: Install signing keys into the SDK
        env:
          APK_SIGN_KEY: ${{ secrets.APK_SIGN_KEY }}
        run: |
          SDK="$GITHUB_WORKSPACE/sdk"
          # OpenWrt signs the apk index with an openssl EC (prime256v1) key:
          #   BUILD_KEY_APK_SEC=$(TOPDIR)/private-key.pem
          #   BUILD_KEY_APK_PUB=$(TOPDIR)/public-key.pem
          # Place ours at those exact paths so 'make package/index' (apk mkndx
          # --sign) and our explicit 'apk adbsign' both use OUR key.
          printf '%s' "$APK_SIGN_KEY" | base64 -d > "$SDK/private-key.pem"
          cp keys/2017fighting.pem "$SDK/public-key.pem"
          chmod 600 "$SDK/private-key.pem"

      - name: Register this repo as a feed (idempotent)
        run: |
          SDK="$GITHUB_WORKSPACE/sdk"
          # The SDK ships feeds.conf.default (luci/packages/...) but no feeds.conf.
          # Seed feeds.conf with luci ONLY. The 'packages' feed is deliberately NOT
          # registered: doing so would make curl/bash/coreutils-timeout buildable,
          # forcing CI to build them (they need core libs the SDK lacks). Kept
          # unregistered, they are runtime-only deps — the apk declares them and the
          # device auto-installs from its own repos. boost (stuntman's build dep) and
          # openssl are pulled into THIS feed at CI time instead (see steps below).
          if [ ! -f "$SDK/feeds.conf" ]; then
            awk '$2=="luci"{print}' "$SDK/feeds.conf.default" > "$SDK/feeds.conf" 2>/dev/null || true
            [ -s "$SDK/feeds.conf" ] || cp "$SDK/feeds.conf.default" "$SDK/feeds.conf"
          fi
          grep -qxF "src-link $FEED_NAME $GITHUB_WORKSPACE" "$SDK/feeds.conf" \
            || printf 'src-link %s %s\n' "$FEED_NAME" "$GITHUB_WORKSPACE" >> "$SDK/feeds.conf"
          echo "--- feeds.conf ---"; cat "$SDK/feeds.conf"

      - name: Pull official openssl into this feed (stuntman-client's +libopenssl dep)
        run: |
          # The SDK ships no core package sources AND only generates build rules for
          # feed packages (package/feeds/*), not ad-hoc package/libs/ additions. So
          # pull the official openssl package — matched to this OpenWrt release —
          # from the openwrt source into THIS feed's working dir (not committed;
          # fetched fresh each run). 'feeds update' below then indexes it as a feed
          # package, and stuntman's +libopenssl dep builds it. Source tarball is on
          # the official OpenWrt mirrors (auto-fetched).
          git clone --depth 1 --branch v${{ matrix.openwrt_version }} --filter=blob:none --sparse https://github.com/openwrt/openwrt.git /tmp/ow-src
          git -C /tmp/ow-src sparse-checkout set package/libs/openssl
          test -f /tmp/ow-src/package/libs/openssl/Makefile
          mkdir -p "$GITHUB_WORKSPACE/libs"
          cp -r /tmp/ow-src/package/libs/openssl "$GITHUB_WORKSPACE/libs/openssl"

      - name: Pull official boost package into this feed (stuntman's PKG_BUILD_DEPENDS:=boost/host)
        run: |
          SDK="$GITHUB_WORKSPACE/sdk"
          # stuntman builds against boost (host). boost lives in the openwrt
          # 'packages' feed, which we deliberately do NOT register (see Register
          # step). Pull it into THIS feed (not committed) from the packages repo at
          # the SDK's pinned ref (parsed from feeds.conf.default), so feeds update
          # indexes it and stuntman's boost/host build dep resolves.
          pkg_ref=$(sed -nE 's@^src-git packages .*(\^|;)([^ ]+).*@\2@p' "$SDK/feeds.conf.default" | head -1)
          [ -n "$pkg_ref" ] || pkg_ref=master
          echo "packages feed ref: $pkg_ref"
          rm -rf /tmp/pkg-feed
          git init /tmp/pkg-feed
          git -C /tmp/pkg-feed remote add origin https://github.com/openwrt/packages.git
          git -C /tmp/pkg-feed sparse-checkout init --cone
          git -C /tmp/pkg-feed sparse-checkout set libs/boost
          git -C /tmp/pkg-feed fetch --depth 1 origin "$pkg_ref"
          git -C /tmp/pkg-feed checkout FETCH_HEAD
          test -f /tmp/pkg-feed/libs/boost/Makefile
          mkdir -p "$GITHUB_WORKSPACE/libs"
          cp -r /tmp/pkg-feed/libs/boost "$GITHUB_WORKSPACE/libs/boost"

      - name: Update + install feeds
        working-directory: ${{ github.workspace }}/sdk
        run: |
          ./scripts/feeds update -a
          # luci-app-mosdns / luci-app-natmapt build via feeds/luci/luci.mk (fetched
          # by update -a). boost + libopenssl are pulled into THIS feed at CI time
          # (stuntman's PKG_BUILD_DEPENDS:=boost/host and +libopenssl dep). natmapt's
          # runtime deps (curl/bash/jsonfilter) and luci-app-natmapt's coreutils-timeout
          # are NOT installed/built here — with the packages feed unregistered they are
          # runtime-only; the device auto-installs them from its own repos.
          ./scripts/feeds install \
            mosdns luci-app-mosdns \
            natmapt luci-app-natmapt \
            natmapt-client-script-transmission natmapt-client-script-deluge \
            natmapt-notify-script-pushbullet natmapt-notify-script-pushover natmapt-notify-script-telegram \
            stuntman-client boost libopenssl

      # The SDK ships no usable .config for CI, so a package compile would
      # otherwise trigger the interactive `menuconfig` (mconf) and die with
      # "Error opening terminal: unknown". defconfig is non-interactive (conf).
      - name: Generate non-interactive .config
        working-directory: ${{ github.workspace }}/sdk
        run: |
          # Select libopenssl (stuntman-client's dep, pulled into the feed at CI
          # time) with engine support OFF: openssl's default devcrypto engine
          # #includes crypto/cryptodev.h (from kmod-cryptodev), which the SDK
          # lacks, so a default-engine openssl fails to compile. stuntman only
          # needs core libssl/libcrypto. defconfig honors the explicit "not set".
          cat > .config <<'EOF'
          CONFIG_PACKAGE_libopenssl=y
          # CONFIG_OPENSSL_ENGINE is not set
          EOF
          make defconfig
          grep -E 'CONFIG_OPENSSL_ENGINE|CONFIG_PACKAGE_libopenssl' .config || true

      - name: Pre-fetch package sources into SDK dl/
        run: |
          mkdir -p "$GITHUB_WORKSPACE/sdk/dl"
          # The SDK's default fetcher only probes the OpenWrt source mirrors
          # (which 404 for custom packages). Pre-populate dl/ with the exact
          # tarball each Makefile declares; PKG_HASH verifies it on extract.
          # mosdns: GitHub source archive of the pinned fork tag.
          curl -fL "https://github.com/2017fighting/mosdns/archive/refs/tags/v5.5.0.tar.gz" \
            -o "$GITHUB_WORKSPACE/sdk/dl/mosdns-5.5.0.tar.gz"
          echo "mosdns sha256: $(sha256sum "$GITHUB_WORKSPACE/sdk/dl/mosdns-5.5.0.tar.gz" | cut -d' ' -f1)"
          # natmap: upstream release tarball declared in net/natmapt/Makefile.
          curl -fL "https://github.com/heiher/natmap/releases/download/20260214/natmap-20260214.tar.xz" \
            -o "$GITHUB_WORKSPACE/sdk/dl/natmap-20260214.tar.xz"
          echo "natmap sha256: $(sha256sum "$GITHUB_WORKSPACE/sdk/dl/natmap-20260214.tar.xz" | cut -d' ' -f1)"

      - name: Build mosdns
        working-directory: ${{ github.workspace }}/sdk
        run: make "package/feeds/$FEED_NAME/mosdns/compile" MOSDNS_GOARCH="${{ matrix.goarch }}" -j"$(nproc)" V=s

      - name: Build luci-app-mosdns
        working-directory: ${{ github.workspace }}/sdk
        run: make "package/feeds/$FEED_NAME/luci-app-mosdns/compile" -j"$(nproc)" V=s

      - name: Smoke-test the built binary
        run: |
          SDK="$GITHUB_WORKSPACE/sdk"
          bin="$(find "$SDK/build_dir" -path '*mosdns-*/mosdns' -type f | head -1)"
          [ -n "$bin" ] || { echo "::error::mosdns binary not found in build_dir"; find "$SDK/build_dir" -maxdepth 4 -name mosdns; exit 1; }
          echo "binary: $bin"
          if [ "${{ matrix.goarch }}" = "amd64" ]; then
            "$bin" version          # runner is amd64 -> can execute directly
          else
            file "$bin"             # cross-arch binary; cannot exec on amd64 runner
            echo "(exec smoke skipped: ${{ matrix.goarch }} binary on amd64 runner)"
          fi

      - name: Verify luci-app-mosdns apk landed in the arch feed dir
        run: |
          SDK="$GITHUB_WORKSPACE/sdk"
          OUT="$SDK/bin/packages/${{ matrix.arch }}/$FEED_NAME"
          # The apk SDK packages the PKGARCH:=all luci-app directly into each
          # arch feed dir, so it is indexed + signed with this arch's
          # packages.adb (both matrix jobs -> both slices carry it). Assert it
          # is present before indexing; fail loudly if a future SDK change
          # regresses this.
          ls -l "$OUT"/luci-app-mosdns-*.apk

      # natmapt is a C binary built with the SDK's musl/gcc toolchain (unlike
      # mosdns, which is pure Go cross-compiled with host Go). Its single Makefile
      # defines natmapt + 5 PKGARCH:=all client/notify script sub-packages; building
      # the source package (natmapt/compile) compiles AND packages all of them — the
      # sub-packages share the net/natmapt source dir, so they have no separate
      # compile targets.
      - name: Build natmapt (+ client/notify script sub-packages)
        working-directory: ${{ github.workspace }}/sdk
        run: make "package/feeds/$FEED_NAME/natmapt/compile" -j"$(nproc)" V=s

      # stuntman-client provides the `stunclient` binary that luci-app-natmapt's
      # NAT-type-test calls. C++ target binary; its PKG_BUILD_DEPENDS:=boost/host
      # triggers a host-boost build first (heavier), and +libopenssl builds the
      # openssl we pulled into the feed. Git source — the SDK clones
      # muink/stunserver.git directly, no dl/ pre-fetch. feeds install maps the
      # stuntman-client split onto its PKG_NAME=stuntman source, so the compile
      # target is stuntman/compile (builds the client/server/testcode splits).
      - name: Build stuntman-client
        working-directory: ${{ github.workspace }}/sdk
        run: make "package/feeds/$FEED_NAME/stuntman/compile" -j"$(nproc)" V=s

      - name: Build luci-app-natmapt
        working-directory: ${{ github.workspace }}/sdk
        run: make "package/feeds/$FEED_NAME/luci-app-natmapt/compile" -j"$(nproc)" V=s

      - name: Smoke-test the built natmap binary
        run: |
          SDK="$GITHUB_WORKSPACE/sdk"
          bin="$(find "$SDK/build_dir" -path '*natmap-*/bin/natmap' -type f | head -1)"
          [ -n "$bin" ] || { echo "::error::natmap binary not found in build_dir"; find "$SDK/build_dir" -maxdepth 5 -name natmap; exit 1; }
          echo "binary: $bin"
          # natmap is a target-arch C binary. Don't try to exec it — it binds
          # ports and would hang the runner — just confirm it compiled to ELF.
          file "$bin"

      - name: Verify natmapt + stuntman-client + luci-app-natmapt apks landed in the arch feed dir
        run: |
          SDK="$GITHUB_WORKSPACE/sdk"
          OUT="$SDK/bin/packages/${{ matrix.arch }}/$FEED_NAME"
          # natmapt and stuntman-client are arch-specific (one apk per arch); the
          # *-script-* sub-packages and luci-app-natmapt are PKGARCH:=all (indexed
          # under each arch slice).
          ls -l "$OUT"/natmapt-*.apk
          ls -l "$OUT"/stuntman-client-*.apk
          ls -l "$OUT"/luci-app-natmapt-*.apk

      - name: Generate repository index
        working-directory: ${{ github.workspace }}/sdk
        run: make package/index -j1 V=s

      - name: Sign index (apk adbsign)
        run: |
          SDK="$GITHUB_WORKSPACE/sdk"
          OUT="$SDK/bin/packages/${{ matrix.arch }}/$FEED_NAME"
          APK="$SDK/staging_dir/host/bin/apk"
          [ -f "$OUT/packages.adb" ] || { echo "::error::packages.adb was not generated"; ls -R "$SDK/bin/packages"; exit 1; }
          # apk embeds the signature directly into packages.adb (no .sig file),
          # exactly how the OpenWrt buildbot signs: apk adbsign --sign-key. A
          # device verifies it on `apk update` with our public key in
          # /etc/apk/keys/ — the same apk binary writes and reads it, so a
          # successful sign is sufficient guarantee the index is verifiable.
          # (apk 3.x's adbverify/update-initdb CLIs differ from 2.x; the buildbot
          # itself signs with adbsign and does not verify in CI.)
          "$APK" adbsign --allow-untrusted --sign-key "$SDK/private-key.pem" "$OUT/packages.adb"
          echo "--- feed dir ---"; ls -l "$OUT"

      - name: Assemble site slice
        run: |
          SDK="$GITHUB_WORKSPACE/sdk"
          OUT="$SDK/bin/packages/${{ matrix.arch }}/$FEED_NAME"
          DEST="site/${{ matrix.openwrt_version }}/${{ matrix.arch }}"
          mkdir -p "$DEST"
          cp "$OUT"/*.apk "$DEST"/
          cp "$OUT/packages.adb" "$DEST"/
          cp "$OUT/index.json" "$DEST"/ 2>/dev/null || true
          echo "--- site slice ---"; ls -l "$DEST"

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ matrix.openwrt_version }}-${{ matrix.arch }}
          path: site/
          retention-days: 7
          if-no-files-found: error

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo (for tooling/ and keys/)
        uses: actions/checkout@v4

      - name: Download all site artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: site-*
          path: site
          merge-multiple: true

      - name: Add public key, README, and feed.sh to the site
        run: |
          mkdir -p site/keys
          cp keys/2017fighting.pem site/keys/2017fighting.pem
          cp README.md site/README.md
          cp feed.sh site/feed.sh

      - name: Generate browsable index.html (Pages has no directory autoindex)
        env:
          SITE_BASE: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: sh tooling/make-index.sh site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
